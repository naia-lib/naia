name: Deploy book to GitHub Pages
on:
  push:
    branches: [main]
    paths: ['book/**']
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'
      - name: Install mdbook preprocessors
        run: |
          cargo install mdbook-mermaid mdbook-pagetoc
          mdbook-mermaid install book/
      - name: Build book
        run: mdbook build book/
      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --include-fragments --exclude-path 'book/book/404.html' 'book/book/**/*.html'
          fail: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: book/book
      - uses: actions/deploy-pages@v4
        id: deployment

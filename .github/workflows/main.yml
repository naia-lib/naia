name: Main

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".github/dependabot.yml"
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings -Wclippy::pedantic -Aclippy::module_name_repetitions -Aclippy::missing_errors_doc -Aclippy::new_without_default -Aclippy::derive-partial-eq-without-eq"

jobs:

  check-format:
    name: Check Format
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Format
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: -- --check

  server-socket:
    strategy:
      fail-fast: false
      matrix:
        package:
          [
            naia-server-socket,
          ]
    name: Server Socket
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Cache crates
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --package ${{ matrix.package }} --no-deps --

      - name: Test
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --package ${{ matrix.package }}

  servers:
    name: Servers
    strategy:
      fail-fast: false
      matrix:
        package:
          [
            naia-server,
            naia-hecs-server,
            naia-bevy-server,
          ]
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Cache crates
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --package ${{ matrix.package }} --no-deps --

      - name: Test
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --package ${{ matrix.package }}

  clients-and-shared:
    name: Clients And Shared
    strategy:
      fail-fast: false
      matrix:
        features: [ mquad, wbindgen ]
        package:
          [
            naia-client-socket,
            naia-socket-shared,
            naia-client,
            naia-shared,
            naia-hecs-client,
            naia-hecs-shared,
          ]

    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Cache crates
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --package ${{ matrix.package }} --features ${{ matrix.features }} --no-deps --

      - name: Test
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --package ${{ matrix.package }} --features ${{ matrix.features }}

  other:
    name: Other
    strategy:
      fail-fast: false
      matrix:
        package:
          [
            naia-bevy-client,
            naia-bevy-shared,
            naia-serde-derive,
            naia-demo-world,
            naia-empty-world,
            naia-serde,
            naia-test,
            naia-parse,
            naia-derive,
          ]
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Cache crates
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --package ${{ matrix.package }} --no-deps --

      - name: Test
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --package ${{ matrix.package }}

  server-demos:
    name: Server Demos
    strategy:
      fail-fast: false
      matrix:
        package:
          [
            naia-macroquad-server-demo,
            naia-bevy-server-demo,
            naia-basic-server-demo,
            naia-server-socket-demo,
            naia-hecs-server-demo,
          ]
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Cache crates
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --package ${{ matrix.package }} --no-deps --

  client-demos:
    name: Client Demos
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-gnu]
        package:
          [
            naia-macroquad-client-demo,
            naia-basic-client-demo-mq,
            naia-socket-client-demo-mq,
            naia-bevy-client-demo,
            naia-hecs-client-demo,
            naia-basic-client-demo-wb,
            naia-socket-client-demo-wb,
          ]
        include:
          - package: naia-basic-client-demo-wb
            target: wasm32-unknown-unknown
            additional-arguments: --lib
          - package: naia-socket-client-demo-wb
            target: wasm32-unknown-unknown
            additional-arguments: --lib
          - package: naia-basic-client-demo-mq
            target: wasm32-unknown-unknown
          - package: naia-socket-client-demo-mq
            target: wasm32-unknown-unknown

    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Install X11 and OpenGL dependencies
        if: matrix.package == 'naia-macroquad-client-demo' || matrix.package == 'naia-basic-client-demo-mq' || matrix.package == 'naia-socket-client-demo-mq'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends libxi-dev libgl1-mesa-dev

      - name: Install wasm target
        if: matrix.target == 'wasm32-unknown-unknown'
        run: rustup target add wasm32-unknown-unknown

      - name: Cache crates
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --package ${{ matrix.package }} --target ${{ matrix.target }} ${{ matrix.additional-arguments }} --no-deps --

  spec-verify:
    name: Spec Adequacy
    runs-on: ubuntu-latest
    steps:
      - name: Clone naia
        uses: actions/checkout@v3

      - name: Clone namako
        run: git clone https://github.com/connorcarpenter/namako.git ${{ github.workspace }}/../namako

      - name: Cache crates
        uses: Swatinem/rust-cache@v2

      - name: Build naia_npa adapter
        run: cargo build --manifest-path test/npa/Cargo.toml

      - name: Build namako CLI
        run: cargo build --manifest-path ${{ github.workspace }}/../namako/cli/Cargo.toml

      - name: Run namako gate (lint + run + verify)
        run: |
          ${{ github.workspace }}/../namako/target/debug/namako gate \
            --specs-dir test/specs \
            --adapter-cmd "${{ github.workspace }}/target/debug/naia_npa"

  docs-check:
    name: Docs Build Clean
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Cache crates
        uses: Swatinem/rust-cache@v2

      - name: cargo doc (library crates only)
        run: |
          cargo doc --no-deps \
            --package naia-shared \
            --package naia-server \
            --package naia-client \
            --package naia-bevy-shared \
            --package naia-bevy-server \
            --package naia-bevy-client \
            --package naia-socket-shared \
            --package naia-server-socket \
            --package naia-client-socket

  # TODO(phase-0.5): add golden-traces check once trace capture harness is built.
  # See SCALE_10K_ENTITIES_LANDING.md §7.2 and §4.2 for the spec.

[package]
name = "naia-bevy-client-demo"
version = "0.1.0"
authors = ["connorcarpenter <connorcarpenter@gmail.com>"]
workspace = "../../.."
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "naia_bevy_client_demo"
path = "src/main.rs"

[lib]
name = "naia_bevy_client_demo"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]

[features]

[dependencies]
naia-bevy-client = { path = "../../../adapters/bevy/client", features = ["transport_webrtc"] }
naia-bevy-demo-shared = { path = "../shared" }

bevy = { version = "0.18", default-features = false, features = [ "bevy_asset", "bevy_window", "bevy_winit", "bevy_core_pipeline", "bevy_render", "bevy_sprite", "bevy_sprite_render", "bevy_log", "x11", "webgl2"] }

cfg-if = { version = "1.0" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { version = "0.2", features = [ "serde-serialize" ] }
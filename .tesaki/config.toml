# Tesaki configuration for Naia
# This config file enables `tesaki run` with zero flags

# Path to specs directory (relative to this config's directory, which is the naia repo root)
specs_dir = "test/specs"

# Adapter command to run the NPA test adapter
adapter_cmd = "cargo run --manifest-path test/npa/Cargo.toml --"

# Runner backend: mock (for testing), cmd (custom command), or claude (Claude Code)
runner = "mock"

# Budget limits
max_retries = 2
max_cert_updates = 3
max_runtime_seconds = 600
max_files_changed = 10

[package]
name = "naia_npa"
version = "0.1.0"
edition = "2021"
publish = false
description = "NPA (Namako Plan Adapter) for Naia BDD tests"

[[bin]]
name = "naia_npa"
path = "src/main.rs"

[dependencies]
# Core namako library with NPA types
namako = { path = "../../../namako", features = ["npap", "macros"] }

# CLI argument parsing
clap = { version = "4.5", features = ["derive"] }

# JSON serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
anyhow = "1.0"

# Async runtime for step execution
tokio = { version = "1.0", features = ["rt"] }
futures = "0.3"
regex = "1.0"

# Step bindings library (World + step functions)
naia-tests = { path = "../tests" }

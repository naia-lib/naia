[package]
name = "naia_npa"
version = "0.1.0"
edition = "2021"
publish = false
license = "MIT OR Apache-2.0"
description = "NPA (Namako Plan Adapter) for Naia BDD tests"

[[bin]]
name = "naia_npa"
path = "src/main.rs"

[dependencies]
# Core namako library with NPA types
namako_engine = { path = "../../../namako/engine", features = ["npap", "macros"] }

# CLI argument parsing
clap = { version = "4.5", features = ["derive"] }

# JSON serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
anyhow = "1.0"

futures = "0.3"
regex = "1.0"

# Step bindings library (World + step functions)
naia-tests = { path = "../tests" }

[package]
name = "naia_spec_tool"
version = "0.1.0"
edition = "2021"
publish = false
license = "MIT OR Apache-2.0"
description = "Spec tool for Naia: golden-trace record/check and scenario verification"

[[bin]]
name = "naia_spec_tool"
path = "src/main.rs"

[dependencies]
naia-test-harness = { path = "../harness" }

clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"

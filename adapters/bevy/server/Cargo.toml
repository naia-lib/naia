[package]
name = "naia-bevy-server"
version = "0.24.0"
authors = ["connorcarpenter <connorcarpenter@gmail.com>"]
workspace = "../../.."
description = "Library to faciliate naia_server & Bevy interop"
homepage = "https://github.com/naia-lib/naia"
repository = "https://github.com/naia-lib/naia"
license = "MIT OR Apache-2.0"
edition = "2021"

[badges]
maintenance = { status = "actively-developed" }

[features]
transport_webrtc = [ "naia-server/transport_webrtc" ]
transport_udp = [ "naia-server/transport_udp" ]
transport_local = [ "naia-server/transport_local" ]
test_time = [ "naia-server/test_time" ]
interior_visibility = [ "naia-server/interior_visibility" ]

[dependencies]
parking_lot = "0.12"
naia-server = { version = "0.24", path = "../../../server", features = ["bevy_support"] }
naia-bevy-shared = { version = "0.24", path = "../shared" }
bevy_app = { version = "0.18", default-features=false }
bevy_ecs = { version = "0.18", default-features=false }
log = { version = "0.4" }

[dev-dependencies]
naia-bevy-client = { path = "../client", features = ["transport_local"] }
naia-server = { path = "../../../server", features = ["bevy_support", "transport_local"] }
naia-client = { path = "../../../client", features = ["bevy_support", "transport_local"] }
naia-shared = { path = "../../../shared", features = ["bevy_support", "transport_local"] }
naia-test-harness = { path = "../../../test/harness" }
parking_lot = "0.12"